services:
  redis:
    image: redis:8-alpine
    # No host port — avoids conflict with system Redis on :6379; API uses redis://redis:6379
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.development
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./backend/app:/app/app

volumes:
  redis_data:
