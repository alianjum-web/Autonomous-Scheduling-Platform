# Quality gates + database migrations only.
# App deploys: Vercel (frontend) and Render (backend) via their GitHub integrations.
# Runtime secrets live on Vercel/Render — not in this workflow.

name: CI & Migrations

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compliance-check:
    name: HIPAA Compliance Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/compliance/*.sh scripts/db/*.sh
      - run: ./scripts/compliance/scan-codebase-for-phi-logging.sh

  validate-database:
    name: Validate Database Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/db/*.sh
      - run: bash scripts/db/validate-migrations.sh

  test-backend:
    needs: [compliance-check, validate-database]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      redis:
        image: redis:7
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt
      - run: ruff check app tests
      - run: pytest tests/ -v --cov=app --cov-report=xml
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UPSTASH_REDIS_URL: redis://localhost:6379/0
          REDIS_URL: redis://localhost:6379/0

      - uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: backend/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  test-frontend:
    needs: [compliance-check, validate-database]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_API_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build
      - run: npm run test:unit
      - run: npx playwright install --with-deps
      - run: npm run test:e2e

  apply-migrations:
    name: Apply Database Migrations
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Verify migration secrets
        run: |
          missing=()
          [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ] && missing+=("SUPABASE_ACCESS_TOKEN")
          [ -z "${{ secrets.SUPABASE_PROJECT_REF }}" ] && missing+=("SUPABASE_PROJECT_REF")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ERROR: Missing GitHub production secrets: ${missing[*]}" >&2
            echo "SUPABASE_ACCESS_TOKEN — https://supabase.com/dashboard/account/tokens" >&2
            echo "SUPABASE_PROJECT_REF  — project ref from dashboard URL" >&2
            echo "Add under: Repo → Settings → Environments → production → Secrets" >&2
            exit 1
          fi

      - uses: supabase/setup-cli@v1
        with:
          version: 2.105.0

      - name: Apply pending migrations
        run: bash scripts/db/push.sh
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
